<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story 🍓</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --strawberry-pink: #ffafcc;
    --soft-cream: #fff1f2;
    --gold-glow: #ffe5ec;
    --text-color: #4a3035;
    --berry-red: #ff4d6d;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Nunito', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 30%, #ffb3c1 70%, #ff8fa3 100%);
    background-size: 300% 300%;
    animation: pastelWave 12s ease-in-out infinite;
    position: relative;
    padding: 20px;
    perspective: 1000px;
    /* إخفاء مؤشر الفارة الافتراضي لتفعيل المؤشر المخصص الجديد */
    cursor: none;
}

/* 🪄 CUTE WAND CURSOR & MAGIC TRAIL STYLES */
.custom-cursor {
    position: fixed;
    top: 0;
    left: 0;
    font-size: 28px;
    pointer-events: none;
    z-index: 10000;
    transform: translate(-5px, -20px) rotate(-15deg); /* موازنة نقرة العصا السحرية */
    user-select: none;
    filter: drop-shadow(0 2px 5px rgba(255, 77, 109, 0.3));
}

.trail-particle {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 14px;
    user-select: none;
    animation: magicFade 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

@keyframes magicFade {
    0% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
        opacity: 1;
        filter: brightness(1.2);
    }
    100% {
        transform: translate(-50%, -50%) scale(0.3) translateY(40px) rotate(180deg);
        opacity: 0;
    }
}

@keyframes pastelWave {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.soft-loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), visibility 1.2s;
    cursor: none;
}

.loader-heart {
    font-size: 3.5rem;
    animation: pulseHeart 1.5s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 15px rgba(255, 77, 109, 0.4));
}

@keyframes pulseHeart {
    0% { transform: scale(0.9); opacity: 0.6; }
    100% { transform: scale(1.1); opacity: 1; }
}

.soft-loader.fade-out {
    opacity: 0;
    visibility: hidden;
}

.card {
    width: 90%;
    max-width: 650px;
    text-align: center;
    color: var(--text-color);
    z-index: 10;
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 50px 35px;
    border-radius: 40px;
    border: 3px solid rgba(255, 255, 255, 0.6);
    box-shadow: 0 20px 45px rgba(223, 114, 137, 0.2);
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.3s ease-out;
    opacity: 0;
    transform: scale(0.95) translateY(20px);
    transition: opacity 1.5s ease, transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
}

.card.revealed {
    opacity: 1;
    transform: scale(1) translateY(0);
}

h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: 2.8rem;
    color: var(--berry-red);
    text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.8);
    margin-bottom: 10px;
}

.counter {
    font-family: 'Fredoka', sans-serif;
    font-size: 4.5rem;
    font-weight: 700;
    color: #c9184a;
    margin: 15px 0;
    text-shadow: 0 0 15px rgba(255, 77, 109, 0.3);
    line-height: 1.1;
    animation: scalePulse 2s ease-in-out infinite alternate;
}

@keyframes scalePulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.03); }
}

.counter span {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.3rem;
    color: #ff758f;
    background: rgba(255, 255, 255, 0.8);
    display: inline-block;
    padding: 4px 18px;
    border-radius: 50px;
    margin-top: 5px;
    box-shadow: 0 5px 12px rgba(255, 143, 163, 0.1);
}

.message {
    font-size: 1.15rem;
    line-height: 1.8;
    color: #5c3d42;
    font-weight: 600;
    margin-top: 25px;
}

.btn {
    display: inline-block;
    margin-top: 40px;
    padding: 16px 50px;
    border-radius: 50px;
    text-decoration: none;
    background: linear-gradient(135deg, #ff758f, #ff4d6d);
    color: white;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1.25rem;
    box-shadow: 0 8px 0px #c9184a, 0 15px 25px rgba(201, 24, 74, 0.25);
    transition: all 0.2s ease;
    position: relative;
    top: 0;
    cursor: none; /* لمنع ظهور السهم فوق الزر */
}

.btn:hover {
    transform: translateY(2px);
    box-shadow: 0 6px 0px #c9184a, 0 10px 20px rgba(201, 24, 74, 0.25);
}

.btn:active {
    top: 8px;
    box-shadow: 0 0px 0px #c9184a, 0 5px 10px rgba(201, 24, 74, 0.1);
}

.sticker {
    position: absolute;
    pointer-events: none;
    z-index: 15;
    animation: softFloat 4s ease-in-out infinite alternate;
    filter: drop-shadow(0 5px 10px rgba(223,114,137,0.15));
}
.stk-1 { top: -35px; left: -25px; font-size: 3.8rem; }
.stk-2 { bottom: -30px; right: -25px; font-size: 3.8rem; animation-delay: 1.2s; }
.stk-3 { top: 25%; right: -45px; font-size: 3rem; animation-delay: 0.6s; }
.stk-4 { bottom: 25%; left: -45px; font-size: 3rem; animation-delay: 1.8s; }

@keyframes softFloat {
    0% { transform: translateY(0) rotate(-6deg); }
    100% { transform: translateY(-12px) rotate(6deg); }
}

.cloud-element {
    position: absolute;
    pointer-events: none;
    animation: softFall linear infinite;
    opacity: 0.8;
}

@keyframes softFall {
    0% {
        transform: translateY(-10vh) translateX(0) rotate(0deg);
        opacity: 0;
    }
    10% { opacity: 0.75; }
    90% { opacity: 0.75; }
    100% {
        transform: translateY(110vh) translateX(40px) rotate(270deg);
        opacity: 0;
    }
}
</style>
</head>
<body>

<div class="custom-cursor" id="customCursor">🪄</div>

<div class="soft-loader" id="softLoader">
    <div class="loader-heart">🪄✨❤️</div>
</div>

<div class="card" id="storyCard">
    <div class="sticker stk-1">🍓✨</div>
    <div class="sticker stk-2">🧸🎈</div>
    <div class="sticker stk-3">☁️🌸</div>
    <div class="sticker stk-4">🍒💝</div>

    <h1>Our Journey Together 🍒</h1>

    <div class="counter" id="days">0<br><span>Days Together</span></div>

    <p class="message">
        Since November 2024, every day with you has been a gift.<br>
        Every laugh, every message, every moment we shared became<br>
        part of the most beautiful story of my life.
        <br><br>
        Thank you for being you, Litissia ❤️
    </p>

    <a href="letter.html" class="btn">
        Continue ✨
    </a>
</div>

<script>
// 🪄 منطق حركة العصا السحرية والشرارات المتساقطة خلفها
const customCursor = document.getElementById('customCursor');
const magicTrailEmojis = ["✨", "💖", "☁️", "🌸", "🌟"];

window.addEventListener('mousemove', (e) => {
    customCursor.style.left = e.clientX + 'px';
    customCursor.style.top = e.clientY + 'px';
    
    if (Math.random() > 0.5) {
        createMagicTrail(e.clientX, e.clientY);
    }
});

window.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
        const touch = e.touches[0];
        customCursor.style.left = touch.clientX + 'px';
        customCursor.style.top = touch.clientY + 'px';
        createMagicTrail(touch.clientX, touch.clientY);
    }
});

function createMagicTrail(x, y) {
    const particle = document.createElement('div');
    particle.className = 'trail-particle';
    particle.innerText = magicTrailEmojis[Math.floor(Math.random() * magicTrailEmojis.length)];
    
    // يضمن خروج الجزيئات من رأس العصا السحرية تقريبًا
    const offsetX = (Math.random() - 0.5) * 20;
    const offsetY = (Math.random() - 0.5) * 20;
    
    particle.style.left = (x + offsetX) + 'px';
    particle.style.top = (y + offsetY) + 'px';
    
    document.body.appendChild(particle);
    
    setTimeout(() => {
        particle.remove();
    }, 700);
}

const start = new Date("2024-11-01");

function initCounter(){
    const now = new Date();
    const diff = now - start;
    const targetDays = Math.floor(diff / (1000 * 60 * 60 * 24));
    
    let currentCount = 0;
    const duration = 1500; 
    const stepTime = Math.max(Math.floor(duration / targetDays), 10);
    
    const timer = setInterval(() => {
        currentCount += Math.ceil(targetDays / 40); 
        if (currentCount >= targetDays) {
            clearInterval(timer);
            currentCount = targetDays;
        }
        document.getElementById("days").innerHTML = 
            currentCount + "<br><span>Days Together</span>";
    }, stepTime);
}

window.addEventListener('DOMContentLoaded', () => {
    const loader = document.getElementById('softLoader');
    const card = document.getElementById('storyCard');
    
    setTimeout(() => {
        loader.classList.add('fade-out'); 
        card.classList.add('revealed');   
        
        setTimeout(() => {
            initCounter();
        }, 300);
        
    }, 1200); 
});

const storyCard = document.getElementById('storyCard');
document.addEventListener('mousemove', (e) => {
    const card = document.getElementById('storyCard');
    if(card.classList.contains('revealed')) {
        const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
        storyCard.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    }
});

document.addEventListener('mouseleave', () => {
    storyCard.style.transform = `rotateY(0deg) rotateX(0deg)`;
});

const cloudThemeElements = ["☁️", "🍓", "🌸", "🤍", "🍒", "🎀", "🧸"];

for(let i = 0; i < 45; i++) {
    let element = document.createElement("div");
    
    element.innerHTML = cloudThemeElements[Math.floor(Math.random() * cloudThemeElements.length)];
    element.classList.add("cloud-element");

    element.style.left = Math.random() * 100 + "vw";
    element.style.top = Math.random() * -15 + "vh";
    element.style.fontSize = (16 + Math.random() * 22) + "px";
    element.style.animationDuration = (6 + Math.random() * 8) + "s";
    element.style.animationDelay = (Math.random() * 5) + "s";

    document.body.appendChild(element);
}
</script>

</body>
</html>
